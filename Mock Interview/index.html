<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <script src='main.js'></script>
</head>
<body>
    
<div class="login-box">
    <h2>Login</h2>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button>Login</button>
</div>

</body>
</html>
    
<style>

.body{

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
    background: #e45b5b;

    }

    .login-box{

        background: #dd6868;
        padding: 20px;
        width: 250px;
        text-align: center;
        border-radius: 10px;
        

    }


    input{

        width: 90%;
        padding: 8px;
        margin: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;

    }

    button{

        padding: 8px 15px;
        background-color: rgb(106, 201, 249);
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;

    }

    button:hover{
        background-color: rgb(136, 241, 136);
    }

</style>
