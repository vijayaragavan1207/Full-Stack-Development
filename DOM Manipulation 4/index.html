<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Manipulation Tasks</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>DOM Manipulation Playground</h1>
        
        <div class="card">
            <h2>1. Change Content</h2>
            <p id="content-text">This is the original text. Click the button to change me!</p>
            <button id="btn-change-content">Change Content</button>
        </div>

        <div class="card">
            <h2>2. Change Styles</h2>
            <div id="style-box" class="box">I am a box</div>
            <button id="btn-change-style">Change Style</button>
        </div>

        <div class="card">
            <h2>3. Change Visibility</h2>
            <div id="visibility-box" class="box">Toggle my visibility</div>
            <button id="btn-toggle-visibility">Hide Element</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
